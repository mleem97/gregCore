name: gregCore CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Funktioniert auf GitHub (windows-latest) und Gitea Runners mit entsprechendem Label
    runs-on: ${{ github.server_url == 'https://github.com' && 'windows-latest' || 'windows' }}

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0.x

    - name: Restore dependencies
      run: dotnet restore gregCore.csproj

    - name: Fetch References (Optional)
      shell: pwsh
      run: |
        if ("${{ secrets.REFS_URL }}" -ne "") {
          Write-Host "Downloading references from private storage..."
          Invoke-WebRequest -Uri "${{ secrets.REFS_URL }}" -OutFile "refs.zip"
          Expand-Archive -Path "refs.zip" -DestinationPath "gregLib/references/MelonLoader" -Force
        } else {
          Write-Host "No REFS_URL secret found. Attempting to build with available local refs or stubs."
        }

    - name: Build gregCore
      run: dotnet build gregCore.csproj -c Release -p:CI=true

    - name: Package Release
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        ./gregScripts/Build-Release.ps1

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: publish/*.zip
        body_path: CHANGELOG.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
